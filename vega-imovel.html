function VegaMap(style,opts={}){
  const id='vmap-'+(++_mapCount)+'-'+Date.now();
  const showPoly=opts.showPolygon!==false;
  const wrapStyle='width:100%;height:100%';
  const useCar=opts.car||PROP_CAR;
  const geomData=PROP_GEOMS[useCar]||PROP_GEOMS[PROP_CAR];

  setTimeout(()=>{
    if(typeof L==='undefined')return;
    const el=document.getElementById(id);
    if(!el||el._leaflet_id)return;

    const map=L.map(id,{
      zoomControl:false,attributionControl:false,
      dragging:false,scrollWheelZoom:false,doubleClickZoom:false,
      touchZoom:false,keyboard:false,
    });

    // Base: ArcGIS World Imagery (satélite)
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {maxZoom:18}
    ).addTo(map);

    if(showPoly){
      const pad=style==='thumb'?6:28;

      // Geometria real obtida do SICAR WFS para o CAR cadastrado
      const wfsUrl='https://geoserver.car.gov.br/geoserver/sicar/wfs'
        +'?service=WFS&version=1.0.0&request=GetFeature'
        +'&typeName=sicar_imoveis_pr&outputFormat=application/json'
        +'&CQL_FILTER=cod_imovel=\''+useCar+'\'';

      // Estilo SICAR padrão
      const sicarStyle={color:'#F5A623',weight:2,fillColor:'#F5A623',fillOpacity:0.3};

      fetch(wfsUrl)
        .then(r=>r.json())
        .then(geojson=>{
          if(!geojson.features||!geojson.features.length)throw new Error('vazio');
          const layer=L.geoJSON(geojson,{style:()=>sicarStyle}).addTo(map);
          map.fitBounds(layer.getBounds(),{padding:[pad,pad]});
        })
        .catch(()=>{
          const local={type:'Feature',geometry:{type:'MultiPolygon',coordinates:[geomData.coords]}};
          const layer=L.geoJSON(local,{style:()=>sicarStyle}).addTo(map);
          map.fitBounds(layer.getBounds(),{padding:[pad,pad]});
        });
    } else {
      map.setView(geomData.center,13);
    }
  },80);
  return '<div id="'+id+'" style="'+wrapStyle+'"></div>';
}

// ═══ SCORE GAUGE ══════════════════════════════════
function ScoreGauge(pct){
  const r=38,circ=2*Math.PI*r;
  const offset=(circ*(1-pct/100)).toFixed(2);
  const color=pct>=70?'#2D6A4F':pct>=50?'#B8A200':'#EF4444';
  return '<div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:96px;height:96px">'
    +'<svg width="96" height="96" viewBox="0 0 96 96">'
    +'<circle cx="48" cy="48" r="38" stroke="#F3F4F6" stroke-width="8" fill="none"/>'
    +'<circle cx="48" cy="48" r="38" stroke="'+color+'" stroke-width="8" fill="none"'
    +' stroke-linecap="round" transform="rotate(-90 48 48)"'
    +' stroke-dasharray="'+circ.toFixed(2)+'" stroke-dashoffset="'+circ.toFixed(2)+'"'
    +' style="--so:'+offset+';animation:score-draw 1.4s ease .4s both"/>'
    +'</svg>'
    +'<div style="position:absolute;text-align:center">'
    +'<div style="font-size:20px;font-weight:800;color:'+color+'">'+pct+'%</div>'
    +'<div style="font-size:9px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px">índice</div>'
    +'</div></div>';
}

function cpfMaskP(v){
  var d=v.replace(/\D/g,'').substring(0,11);
  if(d.length<=3)return d;
  if(d.length<=6)return d.slice(0,3)+'.'+d.slice(3);
  if(d.length<=9)return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6);
  return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,9)+'-'+d.slice(9);
}

function PrataSealSVG(){
  const teeth=18,r1=46,r2=54,pts=[];
  for(let i=0;i<teeth*2;i++){const ang=(i/(teeth*2))*Math.PI*2-Math.PI/2;const r=i%2===0?r2:r1;pts.push((60+Math.cos(ang)*r).toFixed(1)+','+(60+Math.sin(ang)*r).toFixed(1));}

function BronzeSealSVG(){
  const teeth=18,r1=46,r2=54,pts=[];
  for(let i=0;i<teeth*2;i++){const ang=(i/(teeth*2))*Math.PI*2-Math.PI/2;const r=i%2===0?r2:r1;pts.push((60+Math.cos(ang)*r).toFixed(1)+','+(60+Math.sin(ang)*r).toFixed(1));}
  return '<svg width="112" height="112" viewBox="0 0 120 120"><defs><radialGradient id="bz" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#F3D19A"/><stop offset="0.45" stop-color="#C68A47"/><stop offset="1" stop-color="#7E5424"/></radialGradient><linearGradient id="bzRim" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#E9C58E"/><stop offset="1" stop-color="#8A5A28"/></linearGradient></defs><polygon points="'+pts.join(' ')+'" fill="url(#bzRim)"/><circle cx="60" cy="60" r="40" fill="url(#bz)"/><circle cx="60" cy="60" r="40" fill="none" stroke="#7E5424" stroke-opacity="0.4" stroke-width="1.2"/><path d="M76 42 C58 44, 46 56, 48 76 C66 74, 78 62, 76 42 Z" fill="#5A3812" opacity="0.85"/><path d="M50 74 C58 64, 66 56, 74 50" stroke="#F3D19A" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/><path d="M30 92 L48 78 L60 90 L72 78 L90 92 L80 110 L70 100 L60 108 L50 100 L40 110 Z" fill="#8A5A28"/><path d="M48 78 L60 90 L72 78 L66 92 L60 98 L54 92 Z" fill="#5A3812"/><text x="60" y="100" text-anchor="middle" font-family="Roboto,system-ui" font-weight="800" font-size="10" fill="#F3D19A" letter-spacing="1.2">BRONZE</text></svg>';

function ScoreMeterSVG(value,max,size){
  const stroke=12,r=(size-stroke)/2,c=2*Math.PI*r,dash=(value/max)*c;
  const cx=size/2,cy=size/2;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><defs><linearGradient id="meterG" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#D89244"/><stop offset="1" stop-color="#B26A22"/></linearGradient></defs><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#F1ECE2" stroke-width="'+stroke+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="url(#meterG)" stroke-width="'+stroke+'" stroke-linecap="round" stroke-dasharray="'+dash.toFixed(1)+' '+c.toFixed(1)+'" transform="rotate(-90 '+cx+' '+cy+')" /><text x="'+cx+'" y="'+(cy+2)+'" text-anchor="middle" dominant-baseline="middle" font-family="Roboto,system-ui" font-weight="700" font-size="32" fill="#161A18">'+value+'</text><text x="'+cx+'" y="'+(cy+24)+'" text-anchor="middle" font-family="Roboto,system-ui" font-weight="600" font-size="12" fill="#727873" letter-spacing="0.4">/'+max+'</text></svg>';
}
function LyraPropertyMap(){
  // Coordinates: Apiacás / MT area
  const lat=-9.55, lng=-57.45;
  // polygon boundary (approximate rural property shape)
  const poly=[[-9.540,-57.470],[-9.530,-57.440],[-9.545,-57.425],[-9.562,-57.432],[-9.565,-57.458],[-9.552,-57.472]];
  const polyStr=JSON.stringify(poly);
  const id='lyra-map-'+Date.now();
  setTimeout(()=>{
    if(typeof L==='undefined')return;
    const existing=window._lyraMap;
    if(existing){existing.remove();window._lyraMap=null;}
    const map=L.map(id,{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false});
    window._lyraMap=map;
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18}).addTo(map);
    const coords=JSON.parse(polyStr);
    const p=L.polygon(coords,{color:'#39FF8C',weight:2.5,fillColor:'#39FF8C',fillOpacity:0.12}).addTo(map);
    map.fitBounds(p.getBounds(),{padding:[12,12]});
  },80);
  return '<div id="'+id+'" style="width:100%;height:100%"></div>';
}

function BottomBar(){
  if(S.step===1||S.step===5) return '';
  if(S.step===8) return '<div class="bottom-bar">'
    +'<button class="btn-s" style="margin-bottom:8px;width:100%;justify-content:center" onclick="goStep(2)">'+DSIcon('pencil',16,'currentColor')+' Editar imóvel</button>'
    +'<button class="btn-d" onclick="voltarInicio()">'+I.trash+' Excluir imóvel</button>'
    +'</div>';
  let back='<div style="width:80px"></div>', main='';
  if(S.step===2){
    back='';
    main='<button class="btn-p" style="flex:1" onclick="next()">Avançar '+I.arR+'</button>';
  } else if(S.step===3){
    return '<div class="bottom-bar">'
      +'<button class="btn-p" style="margin-bottom:8px" onclick="next()">Confirmar '+I.arR+'</button>'
      +'<button class="btn-d" onclick="goStep(2)">'+I.trash+' Excluir</button>'
      +'</div>';
  } else if(S.step===4){
    return '<div class="bottom-bar"><button class="btn-p" onclick="next()">Iniciar análise '+I.arR+'</button></div>';
  } else if(S.step===6){
    const backStep=S.prevStep||1;
    const backLabel=backStep===8?'Voltar ao imóvel':'Voltar ao início';
    const backFn=backStep===8?'goStep(8)':'voltarInicio()';
    return '<div class="bottom-bar"><button class="btn-p" onclick="'+backFn+'">'+backLabel+'</button></div>';
  }
  return '<div class="bottom-bar"><div style="display:flex;gap:10px">'+back+main+'</div></div>';
}

window.inp=function(id,v){
  S[id]=v;
  const w=document.getElementById(id)?.closest('.tf-wrap');
  if(w)w.classList.toggle('tf-filled',!!v);
};

// ── Pessoas handlers ──────────────────────────────
window.updPessoaNome=function(i,v){
  S.pessoas[i].nome=v;
  if(v.trim())S.pessoaErros[i]=undefined;
  const w=document.getElementById('pn-'+i)?.closest('.tf-wrap');
  if(w)w.classList.toggle('tf-filled',!!v);
};
window.updPessoaCpf=function(i,v){
  var m=cpfMaskP(v);S.pessoas[i].cpf=m;
  var el=document.getElementById('pc-'+i);if(el)el.value=m;
};
window.updPessoaPapel=function(i,v){
  S.pessoas[i].papel=v;
};
window.addPessoa=function(){
  S.pessoas.push({nome:'',cpf:'',papel:''});
  render();
  if(window.lucide)lucide.createIcons();
  setTimeout(()=>{const el=document.getElementById('pn-'+(S.pessoas.length-1));if(el)el.focus();},60);
};
window.removePessoa=function(i){
  S.pessoas.splice(i,1);
  S.pessoaErros.splice(i,1);
  render();
  if(window.lucide)lucide.createIcons();
};

function DiscoveryCard(d,idx){
  var shortCar=d.car.length>28?d.car.substring(0,28)+'…':d.car;
  return '<div style="background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:16px;margin-bottom:12px">'
    // mapa + info
    +'<div style="display:flex;align-items:stretch;gap:12px;margin-bottom:14px">'
    +'<div style="flex-shrink:0;border-radius:4px;overflow:hidden;position:relative;width:96px;align-self:stretch">'
    +VegaMap('thumb',{showPolygon:true,car:d.car})
    +'</div>'
    +'<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:5px">'
    +'<div style="display:flex;align-items:center;gap:5px">'+DSIcon('scan-line',13,'#9CA3AF')+'<span style="font-size:12px;color:#6B7280;font-family:monospace">'+shortCar+'</span></div>'
    +'<div style="display:flex;align-items:center;gap:5px">'+DSIcon('map-pin',13,'#9CA3AF')+'<span style="font-size:12px;color:#6B7280">'+d.cidade+'</span></div>'
    +'<div style="display:flex;align-items:center;gap:5px">'+DSIcon('ruler',13,'#9CA3AF')+'<span style="font-size:12px;color:#6B7280">'+d.area+' ha</span></div>'
    +'</div>'
    +'</div>'
    // CTA
    +'<button class="btn-p" onclick="utilizarImovelDescoberto('+idx+')">'
    +DSIcon('circle-check',16,'#2D6A4F')+'Utilizar imóvel</button>'
    +'</div>';
}

function DiscoveryLoading(){
  function skel(w,h,mb){return '<div style="width:'+w+';height:'+h+'px;border-radius:6px;background:linear-gradient(90deg,#F3F4F6 25%,#E5E7EB 50%,#F3F4F6 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;margin-bottom:'+(mb||8)+'px"></div>';}
  var card='<div style="background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:16px;margin-bottom:12px">'+skel('40%',18,12)+skel('70%',20,8)+skel('90%',14,6)+skel('60%',14,6)+skel('50%',14,14)+skel('100%',42,0)+'</div>';
  return '<style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>'
    +'<div style="padding:0 20px">'+card+card+'</div>';
}

function StepDiscovery(){
  var icBot=DSIcon('bot',22,'#2D6A4F');
  var icArL=DSIcon('arrow-left',20,'currentColor');
  // sub-header (back + title)
  var subHdr='<div style="display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid #F3F4F6;background:#fff">'
    +'<button onclick="S.discovery=false;render()" style="background:none;border:none;padding:4px;cursor:pointer;color:#374151;display:flex">'+icArL+'</button>'
    +'<span style="font-size:15px;font-weight:700;color:#111827">Imóveis vinculados</span>'
    +'</div>';
  var body;
  if(S.discoveryLoading){
    body='<div style="padding:24px 20px 16px;text-align:center">'
      +'<div style="width:52px;height:52px;border-radius:50%;background:#F0FAF4;display:flex;align-items:center;justify-content:center;margin:0 auto 14px">'+DSIcon('bot',26,'#2D6A4F')+'</div>'
      +'<p style="font-size:16px;font-weight:700;color:#111827;margin:0 0 6px">Buscando seus imóveis…</p>'
      +'<p style="font-size:13px;color:#6B7280;margin:0">Consultando o CAR vinculado ao seu CPF.</p>'
      +'</div>'
      +DiscoveryLoading();
  } else {
    var list=IMOVEIS_DESCOBERTOS.map(function(d,i){return {d:d,i:i};}).filter(function(o){return !S.imovelCadastradoIds.includes(o.d.imovelId);}).map(function(o){return DiscoveryCard(o.d,o.i);}).join('');
    body='<div style="padding:24px 20px 16px">'
      // intent banner
      +'<div style="display:flex;align-items:flex-start;gap:10px;background:#F0FAF4;border:1px solid #BBF7D0;border-radius:10px;padding:12px 14px;margin-bottom:20px">'
      +DSIcon('sparkles',18,'#2D6A4F')
      +'<div><p style="font-size:13px;font-weight:700;color:#1B4332;margin:0 0 2px">Encontramos imóveis vinculados ao seu CPF</p>'
      +'<p style="font-size:12px;color:#2D6A4F;margin:0">Selecione um imóvel para continuar ou realize um cadastro manual.</p>'
      +'</div></div>'
      +'</div>'
      +'<div style="padding:0 20px">'+list+'</div>'
      // separator
      +'<div style="padding:24px 20px 0">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
      +'<div style="flex:1;height:1px;background:#E5E7EB"></div>'
      +'<span style="font-size:12px;color:#9CA3AF;white-space:nowrap">Não encontrou o imóvel desejado?</span>'
      +'<div style="flex:1;height:1px;background:#E5E7EB"></div>'
      +'</div>'
      +'<button class="btn-s" style="width:100%;justify-content:center" onclick="cadastrarManualmente()">Cadastrar manualmente</button>'
      +'</div>'
      +'<div style="height:40px"></div>';
  }
  return subHdr+body;
}

    +'<span style="font-size:13px;font-weight:700;color:#1A1A1A;flex:1">Informações agrícolas</span>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px">'
    +'<div><p style="font-size:12px;color:#9CA3AF;margin:0 0 2px;font-weight:500">Cultura</p><p style="font-size:14px;font-weight:600;color:#1A1A1A;margin:0">'+S.cultura+'</p></div>'
    +'<div><p style="font-size:12px;color:#9CA3AF;margin:0 0 2px;font-weight:500">Área plantada</p><p style="font-size:14px;font-weight:600;color:#1A1A1A;margin:0">'+S.areaPlantada+' ha</p></div>'
    +'<div><p style="font-size:12px;color:#9CA3AF;margin:0 0 2px;font-weight:500">Produtividade média</p><p style="font-size:14px;font-weight:600;color:#1A1A1A;margin:0">'+S.produtividade+' t/ha</p></div>'
    +'</div></div>';

  // pessoas
  const pessoasFilled=(S.pessoas||[]).filter(p=>p.nome);
  const pessoasCard='<div style="margin:0 16px 12px;border:1px solid #E0E0E0;border-radius:12px;padding:14px 16px">'
    +'<p style="font-size:13px;font-weight:700;color:#1A1A1A;margin:0 0 12px">Outros produtores vinculados</p>'
    +(pessoasFilled.length
      ? pessoasFilled.map(p=>'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #F3F4F6">'
          +'<div style="width:34px;height:34px;border-radius:50%;background:#E8F0EC;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#2C7A65;flex-shrink:0">'+p.nome.charAt(0).toUpperCase()+'</div>'
          +'<div><p style="margin:0;font-size:13px;font-weight:600;color:#1A1A1A">'+p.nome+'</p>'
          +(p.cpf?'<p style="margin:0;font-size:11px;color:#9CA3AF">CPF '+p.cpf+'</p>':'')
          +(p.papel?'<p style="margin:0;font-size:11px;color:#6B7280">'+p.papel+'</p>':'')
          +'</div></div>').join('')
      : '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #F3F4F6">'
        +DSIcon('user-x',18,'#D1D5DB')
        +'<p style="margin:0;font-size:13px;color:#9CA3AF">Nenhum produtor vinculado.</p>'
        +'</div>'
    )
    +'</div>';

  // documentos placeholder
  const docsCard='<div style="margin:0 16px 12px;border:1px solid #E0E0E0;border-radius:12px;padding:14px 16px">'
    +'<p style="font-size:13px;font-weight:700;color:#1A1A1A;margin:0 0 4px">Documentos</p>'
    +'<p style="font-size:12px;color:#9CA3AF;margin:0">Nenhum documento enviado.</p>'
    +'</div>';

  return '<div class="anim-'+S.dir+'">'
    +'<div style="background:#fff;padding-bottom:40px">'
    +hero
    +'<div style="padding:16px 0 0">'
    +'<div style="padding:0 16px 12px">'
    +'<h2 style="font-size:18px;font-weight:700;color:#1A1A1A;margin:0 0 2px">'+im.nome+'</h2>'
    +'<span style="font-size:12px;color:#9CA3AF;font-family:monospace">'+im.car+'</span>'
    +'</div>'
    +nivelCard
    +propCards
    +agriCard
    +pessoasCard
    +docsCard
    +'</div></div></div>';
}

function render(){
  const steps=[null,Step1,Step2,Step3,Step4,Step5,Step6,Step7,Step8];
  const hdr=AppHeader();
  if(S.discovery){
    document.getElementById('app').innerHTML=hdr+StepDiscovery();
  } else {
    document.getElementById('app').innerHTML=hdr+steps[S.step]()+BottomBar();
  }
  if(window.lucide) lucide.createIcons();
}
