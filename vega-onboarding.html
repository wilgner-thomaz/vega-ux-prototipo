<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VEGA - Cadastro</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/vega-ds.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ── Overrides locais ── */
.terms-scroll::-webkit-scrollbar{width:4px}
.terms-scroll::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:2px}
</style>
</head>
<body>
<div class="shell" id="app"></div>
<script>
// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
const S = {
  step:1, dir:'r', loading:false,
  firstName:'', lastName:'', phone:'', cpf:'',
  e1:{},
  termsOk:false,
  email:'', pwd:'', cpwd:'',
  showPwd:false, showCpwd:false,
  e3:{},
  get strength(){ return calcStr(this.pwd) }
};


function cpfMask(v){
  var d=v.replace(/\D/g,'').substring(0,11);
  if(d.length<=3)return d;
  if(d.length<=6)return d.slice(0,3)+'.'+d.slice(3);
  if(d.length<=9)return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6);
  return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,9)+'-'+d.slice(9);
}
function calcStr(p){
  if(!p)return 0;let s=0;
  if(p.length>=8)s++;
  if(/[A-Z]/.test(p))s++;
  if(/[0-9]/.test(p))s++;
  if(/[^A-Za-z0-9]/.test(p))s++;
  return s;
}
const STR_LBL=['','Fraca','Razoável','Boa','Forte'];
const STR_COL=['','#EF4444','#F59E0B','#3B82F6','#059669'];

function phoneMask(v){
  v=v.replace(/\D/g,'').slice(0,11);
  if(v.length<=2)return v;
  if(v.length<=7)return '('+v.slice(0,2)+') '+v.slice(2);
  return '('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ═══════════════════════════════════════════
//  Validation
// ═══════════════════════════════════════════
function val1(){
  const e={};
  if(!S.firstName.trim())e.firstName='Informe seu primeiro nome';
  if(!S.lastName.trim()) e.lastName='Informe seu sobrenome';
  if(S.phone.replace(/\D/g,'').length<10)e.phone='Telefone inválido';
  if(S.cpf.replace(/\D/g,'').length<11)e.cpf='CPF inválido';
  S.e1=e; return !Object.keys(e).length;
}
function val3(){
  const e={};
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(S.email))e.email='E-mail inválido';
  if(S.pwd.length<8)e.password='Mínimo de 8 caracteres';
  if(S.pwd!==S.cpwd)e.cpwd='As senhas não coincidem';
  S.e3=e; return !Object.keys(e).length;
}

// ═══════════════════════════════════════════
//  Navigation
// ═══════════════════════════════════════════
function goTo(n){S.dir=n>S.step?'r':'l';S.step=n;render()}
async function next(){
  if(S.step===1&&!val1()){render();return}
  if(S.step===3){
    if(!val3()){render();return}
    S.loading=true;render();
    await new Promise(r=>setTimeout(r,1400));
    S.loading=false;
  }
  if(S.step===4){window.location.href='/vega-imovel.html';return;}
  if(S.step<4)goTo(S.step+1);
}
function back(){if(S.step>1)goTo(S.step-1)}

// ═══════════════════════════════════════════
//  Input handlers
// ═══════════════════════════════════════════
window.inp=function(id,v){
  if(id==='firstName'){S.firstName=v;delete S.e1.firstName}
  else if(id==='lastName'){S.lastName=v;delete S.e1.lastName}
  else if(id==='phone'){
    const m=phoneMask(v);S.phone=m;
    const el=document.getElementById('phone');if(el)el.value=m;
    delete S.e1.phone;
    setFilled('phone',m);return;
  }
  else if(id==='cpf'){
    const mc=cpfMask(v);S.cpf=mc;
    const ec=document.getElementById('cpf');if(ec)ec.value=mc;
    delete S.e1.cpf;
    setFilled('cpf',mc);return;
  }
  else if(id==='email'){S.email=v;delete S.e3.email}
  else if(id==='pwd'){S.pwd=v;delete S.e3.password;updateStrength()}
  else if(id==='cpwd'){S.cpwd=v;delete S.e3.cpwd}
  setFilled(id,v);
};

window.blur=function(id){
  if(id==='firstName'&&!S.firstName.trim())S.e1.firstName='Informe seu primeiro nome';
  if(id==='lastName'&&!S.lastName.trim())S.e1.lastName='Informe seu sobrenome';
  if(id==='phone'&&S.phone&&S.phone.replace(/\D/g,'').length<10)S.e1.phone='Telefone inválido';
  if(id==='cpf'&&S.cpf&&S.cpf.replace(/\D/g,'').length<11)S.e1.cpf='CPF inválido';
  if(id==='email'&&S.email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(S.email))S.e3.email='E-mail inválido';
  if(id==='pwd'&&S.pwd&&S.pwd.length<8)S.e3.password='Mínimo de 8 caracteres';
  if(id==='cpwd'&&S.cpwd&&S.pwd!==S.cpwd)S.e3.cpwd='As senhas não coincidem';
  const y=window.scrollY;render(false);window.scrollTo(0,y);
};

window.clear=function(id){
  inp(id,'');
  if(id==='firstName')S.firstName='';
  else if(id==='lastName')S.lastName='';
  else if(id==='phone')S.phone='';
  else if(id==='cpf')S.cpf='';
  else if(id==='email')S.email='';
  else if(id==='pwd')S.pwd='';
  else if(id==='cpwd')S.cpwd='';
  render(false);
  setTimeout(()=>{const e=document.getElementById(id);if(e)e.focus()},30);
};

function setFilled(id,v){
  const w=document.getElementById(id)?.closest('.tf-wrap');
  if(w)w.classList.toggle('tf-filled',!!v);
}
function updateStrength(){
  const c=document.getElementById('str');
  if(c)c.innerHTML=StrengthBar();
}

window.tPwd=()=>{S.showPwd=!S.showPwd;render(false)};
window.tCpwd=()=>{S.showCpwd=!S.showCpwd;render(false)};
window.tTerms=()=>{S.termsOk=!S.termsOk;render(false)};
window.next=next;window.back=back;

// ═══════════════════════════════════════════
//  SVG Icons
// ═══════════════════════════════════════════
const I={
  check:  DSIcon('check',14,'white'),
  eye:    DSIcon('eye',18,'currentColor'),
  eyeOff: DSIcon('eye-off',18,'currentColor'),
  lock:   DSIcon('lock',16,'currentColor'),
  arR:    DSIcon('arrow-right',18,'currentColor'),
  arL:    DSIcon('arrow-left',18,'currentColor'),
  ok:     DSIcon('circle-check',80,'#2D6A4F'),
  spin:   DSIcon('loader-2',18,'currentColor','animation:spin .8s linear infinite;'),
  monitor:DSIcon('monitor',18,'currentColor'),
  pin:    DSIcon('map-pin',18,'currentColor'),
  tree:   DSIcon('tree-pine',18,'currentColor'),
};

// ═══════════════════════════════════════════
//  DS TextField Component
// ═══════════════════════════════════════════
function TF({id,label,type='text',value='',error='',success='',
             im='text',ac='off',clearable=false,
             pwd=false,showPwd=false,prefix=''}){
  const filled=!!value;
  const hasPrefix=!!prefix;
  const wc=['tf-wrap',error?'tf-error':'',filled?'tf-filled':''].filter(Boolean).join(' ');
  const rt=pwd?(showPwd?'text':'password'):type;
  const labelL='left:0';

  const clearBtn=clearable&&filled
    ? '<button type="button" class="tf-clear" onclick="clear(\''+id+'\')" tabindex="-1">&#x2715;</button>':'';
  const pwdBtn=pwd
    ? '<button type="button" class="tf-eye" onclick="'+(id==='pwd'?'tPwd':'tCpwd')+'()" tabindex="-1">'+(showPwd?I.eyeOff:I.eye)+'</button>':'';
  const pfx=hasPrefix
    ? '<div class="tf-prefix">'
      +'<span class="ddi-label">DDI</span>'
      +'<div class="ddi-value"><span style="font-size:16px">&#x1F1E7;&#x1F1F7;</span><span>+55</span></div>'
      +'</div>':'';

  return '<div>'
    +'<div class="'+wc+'" onclick="document.getElementById(\''+id+'\').focus()">'
    +pfx
    +'<div class="tf-inner">'
    +'<label class="tf-label" for="'+id+'" style="'+labelL+'">'+label+'</label>'
    +'<input id="'+id+'" type="'+rt+'" class="tf-input" placeholder=" "'
    +' value="'+esc(value)+'" inputmode="'+im+'" autocomplete="'+ac+'"'
    +' oninput="inp(\''+id+'\',this.value)" onblur="blur(\''+id+'\')">'
    +'</div>'
    +clearBtn+pwdBtn
    +'</div>'
    +(error?'<p class="tf-error-msg">&#9888; '+error+'</p>':'')
    +(!error&&success?'<p class="tf-ok-msg">&#10003; '+success+'</p>':'')
    +'</div>';
}

// ═══════════════════════════════════════════
//  StrengthBar
// ═══════════════════════════════════════════
function StrengthBar(){
  const s=S.strength;
  if(!S.pwd)return'';
  const segs=[1,2,3,4].map(i=>'<div style="flex:1;height:4px;border-radius:2px;background:'+(i<=s?STR_COL[s]:'#E5E7EB')+';transition:background .3s"></div>').join('');
  return '<div style="margin-top:6px"><div style="display:flex;gap:4px">'+segs+'</div><p style="font-size:11px;font-weight:600;margin-top:4px;color:'+STR_COL[s]+'">'+STR_LBL[s]+'</p></div>';
}

// ═══════════════════════════════════════════
//  Stepper
// ═══════════════════════════════════════════
const STEPS=[
  {label:'Etapa 1', title:'Produtor', iconActive:DSIcon('user',22,'#2D6A4F'),    iconInactive:DSIcon('user',22,'#D1D5DB')},
  {label:'Etapa 2', title:'Termos',   iconActive:DSIcon('file-text',22,'#2D6A4F'),iconInactive:DSIcon('file-text',22,'#D1D5DB')},
  {label:'Etapa 3', title:'Conta',    iconActive:DSIcon('lock',22,'#2D6A4F'),    iconInactive:DSIcon('lock',22,'#D1D5DB')},
];

function Stepper(){
  return DSStepperMobile(STEPS, S.step);
}

function Header(){
  return '<div style="background:#fff;padding:16px 20px 16px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+Logo()
    +'<span style="font-size:11px;font-weight:600;color:#9CA3AF;letter-spacing:.5px">CADASTRO</span></div>'
    +(S.step<4?'<div style="background:#fff;border:1px solid #ECECE7;border-radius:12px;padding:16px 12px 12px">'+Stepper()+'</div>':'')
    +'</div>';
}

// ═══════════════════════════════════════════
//  STEP 1
// ═══════════════════════════════════════════
function Step1(){
  return '<div class="anim-'+S.dir+'" style="padding:24px 20px 0">'
    +'<h1 style="font-size:22px;font-weight:800;color:#1A1A1A;margin:0 0 16px">Olá, Alexandre!</h1>'
    +'<p style="font-size:14px;color:#6B7280;line-height:1.6;margin:0 0 24px">Bem-vindo ao programa.<br>Complete seu cadastro para acessar a plataforma e acompanhar a situação socioambiental dos seus imóveis.</p>'
    +'<p style="font-size:11px;font-weight:700;color:#2D6A4F;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">Informações do Produtor</p>'
    +'<div style="display:flex;flex-direction:column;gap:12px">'
    +TF({id:'firstName',label:'Primeiro Nome',value:S.firstName,error:S.e1.firstName||'',clearable:true,ac:'given-name'})
    +TF({id:'lastName', label:'Sobrenome',     value:S.lastName, error:S.e1.lastName||'', clearable:true,ac:'family-name'})
    +TF({id:'cpf',      label:'CPF',            value:S.cpf,      error:S.e1.cpf||'',      clearable:true,im:'numeric',ac:'off'})
    +TF({id:'phone',    label:'Telefone',       value:S.phone,    error:S.e1.phone||'',    clearable:true,im:'tel',ac:'tel-national',prefix:'br'})
    +'</div>'
    +'</div>';
}

// ═══════════════════════════════════════════
//  STEP 2
// ═══════════════════════════════════════════
function Step2(){
  const terms=['Introdução','Elegibilidade','Obrigações do Usuário','Privacidade e Dados','Vigência'];
  const tc=['Ao utilizar a plataforma, você concorda com os termos que regem o uso do sistema de análise socioambiental para imóveis rurais.',
    'O acesso é exclusivo para produtores rurais devidamente cadastrados no programa e com convite válido.',
    'O usuário compromete-se a fornecer informações verídicas e utilizar a plataforma exclusivamente para fins lícitos.',
    'Dados pessoais são tratados conforme a LGPD e usados exclusivamente para análises socioambientais.',
    'Este contrato entra em vigor na data do aceite e permanece válido enquanto houver vínculo ativo.'];
  return '<div class="anim-'+S.dir+'" style="padding:24px 20px 0">'
    +'<h1 style="font-size:22px;font-weight:800;color:#1A1A1A;margin:0 0 6px">Termos e Condições</h1>'
    +'<p style="font-size:14px;color:#6B7280;margin:0 0 16px">Leia atentamente antes de continuar.</p>'
    +'<div style="background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:14px 16px;margin-bottom:14px">'
    +'<p style="font-size:13px;font-weight:700;color:#1B4332;margin:0 0 10px">Ao participar do programa você poderá:</p>'
    +['Acompanhar análises socioambientais','Acessar relatórios detalhados','Acompanhar regularizações'].map(t=>
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
      +'<div style="width:18px;height:18px;border-radius:50%;background:#2D6A4F;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+I.check+'</div>'
      +'<span style="font-size:13px;color:#1B4332;font-weight:500">'+t+'</span></div>').join('')
    +'</div>'
    +'<div class="terms-scroll" style="background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:14px 16px;height:190px;overflow-y:auto;margin-bottom:14px">'
    +terms.map((t,i)=>'<div style="margin-bottom:14px"><p style="font-size:13px;font-weight:700;color:#1A1A1A;margin:0 0 4px">'+(i+1)+'. '+t+'</p><p style="font-size:13px;color:#6B7280;line-height:1.6;margin:0">'+tc[i]+'</p></div>').join('')
    +'</div>'
    +'<label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer" onclick="tTerms()">'
    +'<div class="checkbox-box'+(S.termsOk?' on':'')+'"><svg viewBox="0 0 12 12" width="12" height="12" fill="none">'+(S.termsOk?'<path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':'</svg>')+'</div>'
    +'<span style="font-size:13px;color:#374151;line-height:1.5;font-weight:500;padding-top:1px">Li e concordo com os Termos e Condições do programa.</span>'
    +'</label></div>';
}

// ═══════════════════════════════════════════
//  STEP 3
// ═══════════════════════════════════════════
function Step3(){
  const tips=[['Mínimo 8 caracteres',S.pwd.length>=8],['Letra maiúscula',/[A-Z]/.test(S.pwd)],['Número',/[0-9]/.test(S.pwd)],['Caractere especial',/[^A-Za-z0-9]/.test(S.pwd)]];
  return '<div class="anim-'+S.dir+'" style="padding:24px 20px 0">'
    +'<h1 style="font-size:22px;font-weight:800;color:#1A1A1A;margin:0 0 6px">Criar sua conta</h1>'
    +'<p style="font-size:14px;color:#6B7280;margin:0 0 24px">Defina suas credenciais de acesso à plataforma.</p>'
    +'<p style="font-size:11px;font-weight:700;color:#2D6A4F;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">Credenciais de Acesso</p>'
    +'<div style="display:flex;flex-direction:column;gap:12px">'
    +TF({id:'email',label:'E-mail',type:'email',value:S.email,error:S.e3.email||'',clearable:true,im:'email',ac:'email',success:S.email&&!S.e3.email?'E-mail válido':''})
    +'<div>'+TF({id:'pwd',label:'Senha',value:S.pwd,error:S.e3.password||'',pwd:true,showPwd:S.showPwd,ac:'new-password'})+'<div id="str">'+StrengthBar()+'</div></div>'
    +TF({id:'cpwd',label:'Confirmar Senha',value:S.cpwd,error:S.e3.cpwd||'',pwd:true,showPwd:S.showCpwd,ac:'new-password',success:S.cpwd&&S.pwd===S.cpwd&&!S.e3.cpwd?'Senhas conferem':''})
    +'</div>'
    +'<div style="background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:12px 14px;margin-top:14px">'
    +'<p style="font-size:12px;font-weight:600;color:#374151;margin:0 0 8px">Senha forte:</p>'
    +tips.map(([t,ok])=>'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:14px;height:14px;border-radius:50%;background:'+(ok?'#059669':'#E5E7EB')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s">'+(ok?'<svg viewBox="0 0 10 10" width="10" height="10" fill="none"><path d="M2 5l2.5 2.5 3.5-3.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+'</div><span style="font-size:12px;color:'+(ok?'#059669':'#9CA3AF')+';transition:color .2s">'+t+'</span></div>').join('')
    +'</div></div>';
}

// ═══════════════════════════════════════════
//  STEP 4
// ═══════════════════════════════════════════
function Step4(){
  const ns=[{ico:I.monitor,c:'#2D6A4F',bg:'#F0FAF4',n:1,l:'Acessar plataforma'},{ico:I.pin,c:'#0369A1',bg:'#EFF6FF',n:2,l:'Cadastrar imóvel'},{ico:I.tree,c:'#7C3AED',bg:'#F5F3FF',n:3,l:'Receber análise socioambiental'}];
  return '<div class="anim-'+S.dir+'" style="padding:24px 20px 0">'
    +'<div style="display:flex;flex-direction:column;align-items:center;padding:12px 0 24px">'
    +'<div style="position:relative;width:80px;height:80px;margin-bottom:20px">'
    +'<div class="pulse" style="position:absolute;inset:-8px;border-radius:50%;border:3px solid rgba(64,145,108,.3)"></div>'
    +'<div class="bounce-in">'+I.ok+'</div></div>'
    +'<h1 style="font-size:24px;font-weight:800;color:#1A1A1A;text-align:center;margin:0 0 10px">Cadastro concluído!</h1>'
    +'<p style="font-size:14px;color:#6B7280;text-align:center;line-height:1.6;margin:0;max-width:290px">Sua conta foi criada. Acesse a plataforma e inicie o cadastro do seu imóvel.</p></div>'
    +'<div style="background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:18px;margin-bottom:14px">'
    +'<p style="font-size:11px;font-weight:700;color:#1A1A1A;text-transform:uppercase;letter-spacing:.6px;margin:0 0 14px">Próximos passos</p>'
    +ns.map(({ico,c,bg,n,l},i)=>'<div style="display:flex;align-items:center;gap:12px'+(i<2?';margin-bottom:12px':'')+'">'
      +'<div style="width:36px;height:36px;border-radius:10px;background:'+bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;color:'+c+'">'+ico+'</div>'
      +'<div style="flex:1"><span style="font-size:11px;font-weight:800;color:'+c+';background:'+bg+';border-radius:4px;padding:1px 6px;margin-right:6px">'+n+'</span>'
      +'<span style="font-size:13px;font-weight:600;color:#374151">'+l+'</span></div>'
      +'<span style="color:#D1D5DB;font-size:18px">›</span></div>').join('')
    +'</div>'
    +'</div>';
}

// ═══════════════════════════════════════════
//  Bottom Bar
// ═══════════════════════════════════════════
function BottomBar(){
  const s=S.step;
  const backBtn=s>1&&s<4
    ?'<button class="btn-back" onclick="back()">'+I.arL+' Voltar</button>'
    :'<div style="min-width:70px"></div>';

  let mainBtn;
  if(s===4){
    mainBtn='<button class="btn-main" onclick="next()" style="flex:1">Acessar plataforma '+I.arR+'</button>';
  } else if(s===2){
    const dis=!S.termsOk;
    mainBtn='<button class="btn-main" '+(dis?'disabled':'')+' onclick="next()" style="flex:1;'+(dis?'background:#9CA3AF;box-shadow:none;cursor:not-allowed':'')+'">Concordar e continuar '+I.arR+'</button>';
  } else if(S.loading){
    mainBtn='<button class="btn-main" disabled style="flex:1;opacity:.85">'+I.spin+' Criando conta…</button>';
  } else {
    const lbl=s===3?'Criar minha conta':'Continuar';
    mainBtn='<button class="btn-main" onclick="next()" style="flex:1">'+lbl+' '+I.arR+'</button>';
  }
  const inner=(s===1||s===4)
    ?'<div style="display:flex">'+mainBtn+'</div>'
    :'<div style="display:flex;align-items:center;gap:12px">'+backBtn+mainBtn+'</div>';
  return '<div style="position:sticky;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid #F0F0F0;padding:14px 20px 18px">'+inner+'</div>';
}

// ═══════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════
function render(){
  const steps=[Step1,Step2,Step3,Step4];
  document.getElementById('app').innerHTML=
    Header()
    +'<div style="min-height:calc(100vh - 200px);overflow:hidden">'
    +steps[S.step-1]()
    +'<div style="height:90px"></div></div>'
    +BottomBar();
  if(window.lucide) lucide.createIcons();
}

render();
</script>
</body>
</html>
